services:

  php:
    build:
      context: ./docker/php
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: dev
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - .:/var/www/html
    depends_on:
      - php

  db:
    image: mariadb:11
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: benevoles
      MARIADB_USER: benevoles
      MARIADB_PASSWORD: benevoles
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  db_data: