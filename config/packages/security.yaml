security:
    password_hashers:
        App\Entity\Benevole:
            algorithm: auto
        App\Entity\Administrateur:
            algorithm: auto

    providers:
        benevole_provider:
            entity:
                class: App\Entity\Benevole
                property: email
        admin_provider:
            entity:
                class: App\Entity\Administrateur
                property: email
        chain_provider:
            chain:
                providers: [admin_provider, benevole_provider]

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: chain_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                username_parameter: email
                password_parameter: password
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 7 jours

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/benevole, roles: ROLE_BENEVOLE }
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            App\Entity\Benevole:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
            App\Entity\Administrateur:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
